        Stiche in Bereichen mit hoher Dichte werden um diesen Wert verkürzt (%).
        Mehrere, durch ein Komma getrennte Eingabewerte ergeben verschiedene Einrückstufen bei direkt aufeinanderfolgenden Einzügen.
      image:
        url: /assets/images/docs/satin_multiple_short_stitch_inset_values.jpg
        alt: 
        title: 
    fr:
      title: Décalage des points courts
      description: |
        Les points dans les zones à forte densité seront raccourcis de ce pourcentage.
        Il est possible d'entrer plusieurs valeurs séparées par un espace, la colonne satin les utilisera alternativement pour décaler les points courts consécutifs.
      image:
        url: /assets/images/docs/satin_multiple_short_stitch_inset_values.jpg
        alt: 
        title: 

