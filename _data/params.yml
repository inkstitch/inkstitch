    fr:
      title: Tolérance du point droit
      description: Les points ne peuvent pas être éloignés du chemin de plus que cette distance. Une tolérance basse peut impliquer des points plus courts dans les courbes. Une tolérance haute entraine un arrondissement des angles aigus.
