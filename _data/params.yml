    en:
      title: Inset distance (fixed)
      description: |
        Shrink the outline by a fixed length, to prevent the underlay from showing around the outside of the satin column.
        Negative values are possible.
        It is possible to enter two space separated values to define different values for each side
      add-descr:
        stitch-type: satin_zigzag_underlay
        info: "Default: half of contour underlay inset."
    de:
      title: Einzug (fest)
      description: |
        Einrückung um die Unterlage vollständig von der obenliegenden Schicht zu überdecken.
        Negative Werte sind möglich.
        Durch die Eingabe zweier, durch ein Leerzeichen getrennter Werte, können verschiedene Vorgaben für jede Seite erzeugt werden
      add-descr:
        stitch-type: satin_zigzag_underlay
        info: "Voreinstellung: Hälfte des Einzuges der Konturunterlage."
    fr:
      title: Décalage de sous-couche contour (fixe)
      description: |
        Décale d'une valeur fixe pour couvrir la sous-couche entièrement par la couche supérieure.
        Les valeurs négatives sont possibles.
        Il est possible d'entrer deux valeurs séparées par un espace pour un effet asymétrique.
      add-descr:
        stitch-type: satin_zigzag_underlay
        info: Par défaut la moitié de la valeur est appliquée de chaque coté.

  - name: underlay_inset_percent
    category: size
    applies-to:
      - satin_contour_underlay
      - satin_zigzag_underlay
    en:
      title: Inset distance (proportional)
      description: |
        Shrink the outline by a proportion of the column width, to prevent the underlay from showing around the outside of the satin column.
        Negative values are possible.
        It is possible to enter two space separated values to define different values for each side
      add-descr:
        stitch-type: satin_zigzag_underlay
        info: "Default: half of contour underlay inset."
    de:
      title: Einzug (proportional)
      description: |
        Rückt die Unterlage um einen Prozentwert der jeweiligen eigentlichen Länge ein. Dies verhindert das entstehen von Lücken um die Satinsäule herum.
        Negative Werte sind erlaubt.
        Durch die Eingabe zweier, durch ein Leerzeichen getrennter Werte, können verschiedene Vorgaben für jede Seite erzeugt werden
      add-descr:
        stitch-type: satin_zigzag_underlay
        info: "Voreinstellung: Hälfte des Einzuges der Konturunterlage."
    fr:
      title: Décalage de sous-couche contour (proportionel)
      description: |
        Décale proportionellement à la largeur du satin pour couvrir la sous-couche entièrement par la couche supérieure.
        Les valeurs négatives sont possibles.
        Il est possible d'entrer deux valeurs séparées par un espace pour un effet asymétrique.
      add-descr:
        stitch-type: satin_zigzag_underlay
        info: Par défaut la moitié de la valeur est appliquée de chaque coté.

