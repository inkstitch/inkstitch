  - name: contour_strategy
    category: pattern
    applies-to:
      - contour_fill
    en:
      title: Contour Fill Strategy
      description: |
        **Inner to outer** (default) is able to fill shapes with bottlenecks
        **Single spiral** fills a shape with a single spiral from the outside to the inside
        **Double spiral** fills a shape with a double spiral, starts and ends at the outside border of the shape.
      image:
        url: /assets/images/docs/contour-fill-innertoouter-bottlenecks.jpg
        alt: 
        title: 
    de:
      title: Strategie
      description: |
        **Von Innen nach Außen** (Standard) kann auch Formen mit Engpässen füllen
        **Einfach Spirale** füllt eine Fläche mit einer einfachen Spirale von außen nach innen
        **Doppelte Spirale** füllt eine Fläche mit einer doppelten Spirale, die Außen beginnt und endet.
      image:
        url: /assets/images/docs/contour-fill-spirals.jpg
        alt: 
        title: 
    fr:
      title: Stratégie de remplissage selon le contour
      description: |
        **Intérieur vers extérieur** (valeur par défaut) est capable de remplir des formes avec un goulot d'étranglement
        **Spirale Simple** remplit une forme avec une spirale unique de l'extérieur vers l'intérieur
        **Spirale doublel** remplit une forme avec une double spirale, en commençant et terminant sur la frontière extérieure de la forme.
      image:
        url: /assets/images/docs/contour-fill-spirals.jpg
        alt: 
        title: 

  - name: guided_fill_strategy
    category: pattern
    applies-to:
      - guided_fill
    en:
      title: Guided Fill Strategy
      description: |
        * Copy( default), top, fill the shape with copies of the guide lines.
        * Parallel offset, bottom, will ensure that each line is always a consistent distance from its neighbor. Sharp corners may be introduced.
        * Buffer
      image:
        url: /assets/images/docs/guidedfillstrategies.svg
        alt: 
        title: 
    de:
      title: Strategie
      description: |
        * Kopieren (Standard), oben, füllt die Form mit Hilfe von Kopien der Führungslinie.
        * Parallelverschiebung, unten, stellt sicher, dass die Abstände gleich bleiben (dies kann zu scharfen Kanten führen).
        * Buffer
      image:
        url: /assets/images/docs/guidedfillstrategies.svg
        alt: 
        title: 
    fr:
      title: Stratégie pour le remplissage guidé
      description: |
        * Copier(valeur par défaut), en haut sur le dessin, remplit la forme avec des copies translatées de la ligne guide.
        * Décalage parallèle, en bas sur le dessin, remplit avec des lignes qui sont calculées à partir de la ligne guide pour que chaque ligne soit a distance constante de la ligne précédente. Cette stratégie peut introduire des angles aigus.
        * Buffer
      image:
        url: /assets/images/docs/guidedfillstrategies.svg
        alt: 
        title: 

  - name: expand_mm
    category: size
    applies-to:
      - tatami
      - circular_fill
      - contour_fill
      - cross_stitch
      - guided_fill
      - linear_gradient_fill
      - meander_fill
      - tartan_fill
      - legacy-fill
    en:
      title: Expand
      description: Expand the shape before fill stitching, to compensate for gaps between shapes.
      add-descr:
        - stitch-type: cross_stitch
          info: It is recommended to use at least a small expand value (e.g. 0.2) on cross stitch elements.
      image:
        url: /assets/images/docs/params-fill-expand.png
        alt: 
        title: 
    de:
      title: Erweitern
      description:  Erweitern der Form vor dem Füllstich, um Lücken zwischen den Formen auszugleichen.
      add-descr:
        - stitch-type: cross_stitch
          info: Für den Kreuzstich wird ein kleiner Wert (z.B. 0.1) empfohlen.
      image:
        url: /assets/images/docs/params-fill-expand.png
        alt: 
        title: 
    fr:
      title: Élargir
      description: Etend la forme avant le point de remplissage pour compenser les écarts entre les formes en raison de l'étirement du tissu.
      add-descr:
        - stitch-type: cross_stitch
          info: Il est recommandé d'utiliser au moins une petite valeur d'expansion (par exemple 0,2) sur les éléments de point de croix.
      image:
        url: /assets/images/docs/params-fill-expand.png
        alt: 
        title: 

  - name: angle
    category: pattern
    applies-to:
      - tatami
      - tartan_fill
      - tatami-underlay
      - legacy-fill
    en:
      title: Angle of lines of stitches
      description: |
        The angle of the rows of stitches, in degrees.
        0 is horizontal, and the angle increases in a counter-clockwise direction.
        Negative angles are allowed.
      image:
        url: /assets/images/docs/params-fill-angle.png
        alt: 
        title: 
    de:
      title: Winkel der Stichlinien
      description: |
        Der Winkel nimmt gegen den Uhrzeigersinn zu.
        0 ist horizontal.
        Negative Winkel sind erlaubt.
      image:
        url: /assets/images/docs/params-fill-angle.png
        alt: 
        title: 
    fr:
      title: Angle des rangées de points
      description: |
        L'angle des rangées de points, en degrés.
        0 est horizontal et l'angle augmente dans le sens contraire des aiguilles d'une montre.
        Les angles négatifs sont autorisés.
      image:
        url: /assets/images/docs/params-fill-angle.png
        alt: 
        title: 

  - name: gap_fill_rows
    category: compensation
    applies-to:
      - tatami
    en:
      title: Gap Filling
      description: Add extra rows to compensate for gaps between sections caused by distortion.Rows are always added in pairs, so this number will be rounded up to the nearest multiple of 2.
      image:
        url: /assets/images/docs/fill_gap_filling.jpg
        alt: 
        title: 
    de:
      title: Lücken schließen
      description: Fügt zusätzliche Reihen zwischen Abschnitten hinzu, um Verzug auszugleichen. Reihen werden immer in Paaren hinzugefügt. Ungerade Eingaben werden aufgerundet.
      image:
        url: /assets/images/docs/fill_gap_filling.jpg
        alt: 
        title: 
    fr:
      title: Boucher les espaces entre sections
      description: Ajoute des rangées supplémentaires pour compenser les espaces entre les sections causés par la distorsion. Les rangées sont toujours ajoutées par paires donc ce nombre sera arrondi au nombre pair supérieur le plus proche.
      image:
        url: /assets/images/docs/fill_gap_filling.jpg
        alt: 
        title: 

  - name: max_stitch_length_mm
    category: stitch_length
    applies-to:
      - tatami
      - contour_fill
      - cross_stitch
      - guided_fill
      - linear_gradient_fill
      - tartan_fill
      - tatami-underlay
      - legacy-fill
    en:
      title: Maximum fill stitch length
      description: The length of each stitch in a row. "Max" is because a shorter stitch may be used at the start or end of a row.
      image:
        url: /assets/images/docs/params-fill-stitch_length.png
        alt: 
        title: 
    de:
      title: Maximale Füll-Stichlänge
      description: Die Stichlänge in einer Reihe. Ein kürzerer Stich kann am Anfang oder am Ende einer Reihe verwendet werden.
      image:
        url: /assets/images/docs/params-fill-stitch_length.png
        alt: 
        title: 
    fr:
      title: Longueur maximale du point de remplissage
      description: La longueur de chaque point dans une rangée. "Max", c'est parce qu'un point plus court peut être utilisé au début ou à la fin d'une ligne.
      image:
        url: /assets/images/docs/params-fill-stitch_length.png
        alt: 
        title: 

  - name: row_spacing
    category: density
    applies-to:
      - tatami
      - circular_fill
      - contour_fill
      - guided_fill
      - linear_gradient_fill
      - tartan_fill
      - legacy-fill
      - tatami-underlay
    en:
      title: Spacing between rows
      description: Distance between rows of stitches
      image:
        url: /assets/images/docs/params-fill-spacing_between_rows.png
        alt: 
        title: 
    de:
      title: Reihenabstand
      description: Abstand zwischen den Stichreihen.
      image:
        url: /assets/images/docs/params-fill-spacing_between_rows.png
        alt: 
        title: 
    fr:
      title: Espacement entre les rangées
      description: Espacement entre les rangées de points.
      image:
        url: /assets/images/docs/params-fill-spacing_between_rows.png
        alt: 
        title: 

  - name: end_row_spacing_mm
    category: density
    applies-to:
      - tatami
      - circular_fill
      - legacy-fill
    en:
      title: End row spacing
      description: If set, increases or decreases the row spacing towards the end
      image:
        url: /assets/images/docs/params-fill-end_row_spacing.png
        alt: 
        title: 
    de:
      title: Reihenabstand (Ende)
      description: Erhöht oder verringert den Reihenabstand zum Ende hin.
      image:
        url: /assets/images/docs/params-fill-end_row_spacing.png
        alt: 
        title: 
    fr:
      title: Espacement final entre les rangées
      description: Si une valeur est saisie, l'espacement entre les rangées augmente ou diminue au fur et à mesure jusqu'à atteindre la valeur finale.
      image:
        url: /assets/images/docs/params-fill-end_row_spacing.png
        alt: 
        title: 

  - name: staggers
    category: pattern
    applies-to:
      - tatami
      - ripple-stitch
      - guided_fill
      - linear_gradient_fill
      - tartan_fill
      - legacy-fill
    en:
      title: Stagger rows this many times before repeating
      image: 
        url: /assets/images/docs/params-fill-stagger.png
        alt: 
        title: 
      description: |
        Stitches are staggered so that neighboring rows of stitches don't all fall in the same column (which would create a distracting valley effect).
        Setting this dictates the length of the cycle by which successive stitch rows are staggered.
        Fractional values are allowed and can have less visible diagonals than integer values.
      add-desc:
        - stitch-type: ripple-stitch
          info: For linear ripples only.
    de:
      title: Stichversatz
      image: 
        url: /assets/images/docs/params-fill-stagger.png
        alt: 
        title: 
      description: Dieser Wert beschreibt, nach wie vielen Reihen die Einstichstellen von benachbarten Reihen wieder übereinander liegen. Dezimalwerte sind zulässig und zeigen weniger deutliche Diagonalen im Stickbild.
      add-descr:
        - stitch-type: ripple-stitch
          info: Nur für lineare Ripples.
    fr:
      title: Décaler autant de fois avant de répéter
      image: 
        url: /assets/images/docs/params-fill-stagger.png
        alt: 
        title: 
      description: |
        Les points sont décalés de manière à ce que les rangées de points voisines ne tombent pas toutes dans la même colonne (ce qui créerait un effet de vallées).
        Ce paramètre détermine la longueur du cycle de décalage des rangées.
        Les fractions sont autorisées et peuvent produire des diagonales moins visibles que les valeurs entières.
      add-desc:
        - stitch-type: ripple-stitch
          info: For linear ripples only.

  - name: pull_compensation_mm
    category: compensation
    applies-to:
      - tatami
    en:
      title: Pull compensation
      description: Fill stitch can pull the fabric together, resulting in a shape narrower than you draw in Inkscape. This setting expands each row of stitches outward from the center of the row by a fixed length. Two values separated by a space may be used for an asymmetric effect.
      image:
        url: /assets/images/docs/fill-pull_comp_mm.jpg
        alt: 
        title: 
    de:
      title: Zugausgleich
      description: Füllstitche ziehen den Stoff zusammen. Dadurch wird das Stickbild schmaler, als die in Inkscape gezeichnete Form. Diese Einstellung erweitert jede Reihe um einen festen Wert, um diesen Effekt auszugleichen. Zwei durch ein Leerzeichen getrennte Werte können für einen asymmetrischen Effekt genutzt werden.
      image:
        url: /assets/images/docs/fill-pull_comp_mm.jpg
        alt: 
        title: 
    fr:
      title: Compensation d'étirement
      description: Les points de remplissage resserrent le tissu, ce qui entraîne une forme plus étroite que celle que vous dessinez dans Inkscape. Ce paramètre allonge d'une valeur fixe chaque rangée de ponts. Deux valeurs séparées par un espace peuvent être utilisées pour un effet asymétrique.
      image:
        url: /assets/images/docs/fill-pull_comp_mm.jpg
        alt: 
        title: 

  - name: pull_compensation_percent
    category: compensation
    applies-to:
      - tatami
    en:
      title: Pull compensation percent
      description: Additional pull compensation which varies as a percentage of row width. Two values separated by a space may be used for an asymmetric effect.
      image:
        url: /assets/images/docs/fill-pull_comp_percent.jpg
        alt: 
        title: 
    de:
      title: Zugausgleich (%)
      description: Zusätzliche Zugkompensation, die als Prozentwert der ursprünglichen Länge variiert. Zwei durch ein Leerzeichen getrennte Werte können für einen asymmetrischen Effekt verwendet werden.
      image:
        url: /assets/images/docs/fill-pull_comp_percent.jpg
        alt: 
        title: 
    fr:
      title: ourcentage de compensation d'étirement
      description: Compensation d'étirement supplémentaire qui varie comme un pourcentage de la longueur de la rangée. Deux valeurs séparées par un espace peuvent être utilisées pour un effet asymétrique.
      image:
        url: /assets/images/docs/fill-pull_comp_percent.jpg
        alt: 
        title: 

  - name: skip_last
    category: density
    applies-to:
      - tatami
      - guided_fill
      - linear_gradient_fill
      - tatami-underlay
      - legacy-fill
    en:
      title: Skip last stitch in each row
      description: The last stitch in each row is quite close to the first stitch in the next row. Skipping it decreases stitch count and density.
      image:
        url: /assets/images/docs/params-fill-skip_stitches.png
        alt: 
        title: 
    de:
      title: Letzten Stich in jeder Reihe überspringen
      description: Der letzte Stich in jeder Reihe ist dem darauffolgenden Stich sehr nah. Ihn zu überspringen verringert die Stichanzahl und Dichte.
      image:
        url: /assets/images/docs/params-fill-skip_stitches.png
        alt: 
        title: 
    fr:
      title: Sauter le dernier point dans chaque rangée
      description: Le dernier point de chaque rangée est assez proche du premier point de la rangée suivante. Le sauter diminue le nombre de points et la densité.
      image:
        url: /assets/images/docs/params-fill-skip_stitches.png
        alt: 
        title: 

  - name: underpath
    category: travel
    applies-to:
      - tatami
      - circula_fill
      - guided_fill
      - tatami-underlay
    en:
      title: Underpath
      description: Must be enabled to let running stitches travel inside shape instead of around the border when moving from section to section
      image:
        url: /assets/images/docs/params-fill-underpathing.png
        alt: 
        title: 
    de:
      title: Verbindungsstiche innerhalb des Objektes
      description: Muss aktiviert sein, um Geradstiche zum Verbinden der Abschnitte innerhalb des Objekts verlaufen zu lassen, anstatt sie am Rand entlang zu führen.
      image:
        url: /assets/images/docs/params-fill-underpathing.png
        alt: 
        title: 
    fr:
      title: Chemin de dessous
      description: Doit être activé pour permettre aux points droits de se placer à l'intérieur de la forme plutôt que de suivre la bordure lors du déplacement d'une section à l'autre.
      image:
        url: /assets/images/docs/params-fill-underpathing.png
        alt: 
        title: 

  - name: fill_underlay_inset_mm
    category: size
    applies-to:
      - tatami-underlay
    en:
      title: Inset
      description: Inset to cover the underlay entirely by the top layer. Negative values are possible (usefull for "knockdown" stitches).
    de:
      title: Einzug
      description: Einzug, um die Unterlage vollständig durch die oberste Schicht abzudecken. Negative Werte sind möglich (nützlich für "Knockdown-Stiche").
    fr:
      title: Décalage
      description: Décalage pour que la sous-couche soit totalement masquée par la couche supérieure. Une valeur négative est possible (utile pour les "knockdown" - par exemple pour broder sur de l'éponge).

  - name: flip
    category: direction
    applies-to:
      - legacy-fill
    en:
      title: Flip fill
      description: The flip option can help you with routing your stitch path. When you enable flip, stitching goes from right-to-left instead of left-to-right. Using flip and rotating 180 additional degrees (by adding or subtracting 180 from **angle**), you can cause fill stitching for a given shape to start from any of the four possible corners.
    de:
      title: Füllung umkehren (von rechts nach links)
      description: Die Umkehr-Option kann bei der Reihenfolge des Stichpfads helfen. Wenn Umdrehen aktiviert wird, wird das Sticken von rechts nach links anstatt von links nach rechts ausgeführt.
    fr:
      title: Inverser le remplissage (début à la droite vers la gauche) 
      description: L’option intervertir peut vous aider avec l'agencement de votre chemin de broderie. Lorsque vous activez l'inversion, la broderie va de droite à gauche au lieu de gauche à droite. En utilisant cette option conjointement avec une modification de l'angle (en ajoutant ou soustrayant 180 degrés), vous pouvez choisir n'importe lequel des quatre coins comme point de départ.

  - name: reverse
    category: direction
    applies-to:
      - legacy-fill
    en:
      title: Reverse fill
      description: Reverses fill path
    de:
      title: Rückwärtsfüllung
      description: Stickt den Pfad rückwärts 
    fr:
      title: Inverser le remplissage
      description: Inverse le chemin de remplissage.

  - name: cross_stitch_method
    category: pattern
    applies-to:
      - cross_stitch
    en:
      title: Cross stitch method
      description: Choose method (for detailed information see above)
    de:
      title: Kreuzstich-Methode
      description: Wähle eine Methode. Für detailierte Informationen siehe oben.
    fr:
      title: Méthode de Point de Croix
      description: Choisir la méthode (voir ci-dessus pour des informations détaillées)

  - name: pattern_size_mm
    category: pattern
    applies-to:
      - cross_stitch
    en:
      title: Pattern size
      description: Defines the size of the cross stitch (grid)
    de:
      title: Mustergröße
      description: Definiert die Größe des Kreuzstichgitters
    fr:
      title: Dimension des cellules
      description: Défini les dimensions de la grille de point de croix

  - name: canvas_grid_origin
    category: pattern
    applies-to:
      - cross_stitch
    en:
      title: Align grid with canvas
      description: |
        This ensures good alignment for adjacent cross stitch areas, but it also means that the outcome may change when the element is moved off the grid.
        Disable this option to ensure, that this element stitches the same, independently on its position on the canvas.
    de:
      title: Gitter an Arbeitsfläche ausrichten
      description: |
        Dies gewährleistet eine gute Ausrichtung benachbarter Kreuzstichbereiche, bedeutet jedoch auch, dass sich das Ergebnis ändern kann, wenn das Element verschoben wird.
        Ist die Option deaktiviert, wird das Element unabhängig von seiner Position auf der Leinwand immer gleich gestickt wird.
    fr:
      title: Aligner la grille avec le canevas
      description: |
        Cela garantit un bon alignement des zones de point de croix adjacentes, mais cela signifie également que le résultat peut changer lorsque l'élément est déplacé hors de la grille. 
        Désactivez cette option pour garantir que cet élément soit brodé de la même manière, quelle que soit sa position sur le canevas.

  - name: cross_offset_mm
    category: pattern
    applies-to:
      - cross_stitch
    en:
      title: Grid Offset
      description: Shifts the cross stitch grid by given values. X and Y values are separated by a space. Only one input value offsets the pattern evenly for x and y.
    de:
      title: Gitter-Versatz
      description: Verschiebt das Gitter um die angebenen Werte. X und Y Werte werden durch ein Leerzeichen getrennt angegeben. Ist nur ein Wert definiert, wird er für beide Richtungen verwendet.
    fr:
      title: Décalage de la grille
      description: Translate la grille de point de croix selon des valeurs données X et Y séparées par un espace. Une valeur unique induit une translation identique sur les axes horizontaux et verticaux

  - name: fill_coverage
    category: pattern
    applies-to:
      - cross_stitch
    en:
      title: Fill coverage
      description: Percentage of overlap for each cross with the fill area.
    de:
      title: Füllabdeckung
      description: Prozentuale Überlappung für jeden Kreuzstich mit der Füllfläche
    fr:
      title: Couverture du remplissage
      description: Pourcentage de superposition avec le remplissage nécessaire à la création d'une croix

  - name: meander_pattern
    category: pattern
    applies-to:
      - meander_fill
    en:
      title: Meander Pattern
      description: Various patterns to choose from
    de:
      title: Muster
      description: Various patterns to choose from
    fr:
      title: Motif de méandre
      description: Divers motifs au choix

  - name: meander_angle
    category: pattern
    applies-to:
      - meander_fill
    en:
      title: Meander pattern angle
      description: Rotates Pattern
    de:
      title: Winkel des Musters
      description: Rotiert das Muster
    fr:
      title: Angle du motif de méandre
      description: en degré

  - name: meander_scale_percent
    category: pattern
    applies-to:
      - meander_fill
    en:
      title: Meander pattern scale
      description: Scale the pattern (%)
    de:
      title: Muster skalieren
      description: Skaliert das Muster (%)
    fr:
      title: Échelle du motif de méandre
      description:  Mise à l'échelle du motif (en %)

  - name: clip
    category: pattern
    applies-to:
      - meander_fill
    en:
      title: Clip path
      description: Constrain stitching to the shape.  Useful when smoothing and expand are used. 
    de:
      title: Pfad auf Form beschränken
      description: Nützlich bei der Verwendung von Glätten und Erweitern. Sorgt dafür, dass keine Stiche außerhalb der ursprünglichen Form liegen.
    fr:
      title: Contraindre le chemin à la forme
      description: Contraint le chemin à la forme. Utile en cas d'utilisation d' expansion ou de lissage

  # Wiederholungen

  - name: repeats
    category: repeats
    applies-to:
      - running-stitch
      - ripple-stitch
      - zigzag-stitch
      - satin_center_underlay
      - circular_fill
      - meander_fill
    en:
      title: Repeats
      description: |
        Defines how many times to stitch  along the path
        * Odd number: stitches will end at the end of the path
        * Even number: stitching will return to the start of the path
      add-descr:
        - stitch-type: satin_center_underlay
          info: Odd numbers of repeats will reverse the stitch direction of the satin column, causing it to start and end at the same position.
    de:
      title: Wiederholungen
      description: |
        Legt fest, wie oft der Pfad durchlaufen werden soll
        * Ungerade Zahl: Stiche enden am Ende des Pfades
        * Gerade Zahl: Stiche starten und Enden am gleichen Punkt
      add-descr:
        - stitch-type: satin_center_underlay
          info: Bei einer ungeraden Anzahl an Wiederholungen wird die Richtung, in die die Satinsäule verläft umgekehrt. Sie endet entsprechend wieder am Startpunkt.
    fr:
      title: Répétitions
      description: |
        Définir combien de fois aller et revenir le long du chemin
        * Nombre impair: les points se termineront à la fin du chemin
        * Nombre pair: la broderie va revenir au début du chemin
      add-descr:
        - stitch-type: satin_center_underlay
          info: Un nombre impair renverse la direction de broderie de la colonne satin, la broderie commencera et terminera au même endroit.

  - name: bean_stitch_repeats
    category: repeats
    applies-to:
      - running-stitch
      - ripple-stitch
      - zigzag-stitch
      - manual-stitch
      - circular_fill
      - cross_stitch
      - guided_fill
      - meander_fill
      - tartan_fill
    en:
      title: Bean stitch number of repeats
      description: |
        Determines the number of times to repeat each stitch.
        * A value of `0` does not repeat the stitch (normal stitch)
        * A value of `1` repeats each stitch three times (forward, back, forward).
        * A value of `2` repeats the stitch six times.
        * By entering multiple numbers, it is possible to define a custom repeat pattern. For instance `0 1` will create alternating single and triple stitches (`≡-≡-≡`).
    de:
      title: Mehrfachgeradstich Wiederholungen
      description: |
        * Jeden Stich vervielfachen.
        * Ein Wert von `0` wiederholt den Stich nicht, er wird einal gestickt.
        * Ein Wert von `1` verdreifaht den Stich (vorwärts, rückwärts, vorwärts).
        * Ein Wert von `2` führt jeden Stich fünffach aus, usw.<br/>* Die Eingabe mehrerer durch ein Leerzeichen getrennte Werte erzeugt ein Muster (z.B ergibt der Wert `1 0` einen Wechsel von einfachen Geradstichen und Dreifachstichen: `≡-≡-≡`)
    fr:
      title: Nombre de répétitions du point triple
      description: |
        * Repasse sur chaque point le nombre de fois indiqué.
        * Une valeur de 1 triplera chaque point (avant, arrière, avant).
        * Une valeur de 2 permettra de quintupler chaque point, etc..
        * Il est possible de définir un motif de répétitions en entrant plusieurs valeurs séparées par un espace (ces valeurs seront utilisées alternativement par les points)

  - name: join_style
    category: pattern
    applies-to:
      - contour_fill
    en:
      title: Join Style
      description: Method to handle the edges when the size the contour is reduced for the inner spirals (Round, Mitered, Beveled)
    de:
      title: Stil der Verbindungen
      description: Legt fest, wie Ecken beim Herunterskalieren der Kontur für die inneren Spiralen behandelt werden sollen (rund, spitz oder abgeschrägt)
    fr:
      title: Style de jointure
      description: Rond, à onglet, biseauté|Méthode pour gérer les arêtes lorsque la taille du contour est réduite pour les spirales intérieures

  - name: avoid_self_crossing
    category: pattern
    applies-to:
      - contour_fill
    en:
      title: Avoid self-crossing 
      description: Wheter inner to outer is allowed to cross itself or not
      image:
        url: /assets/images/docs/contour-fill-self-crossing.jpg
        alt: 
        title: 
    de:
      title: Selbstüberschneidungen vermeiden
      description: Legt fest, ob die Pfade sich bei der Methode `Von Innen nach Außen` überkreuzen dürfen oder nicht
      image:
        url: /assets/images/docs/contour-fill-self-crossing.jpg
        alt: 
        title: 
    fr:
      title: Eviter l'auto croisement
      description: Choisir si intérieur vers extérieur est autorisé à se croiser, ne s'applique pas aux autres stratégies de remplissage.
      image:
        url: /assets/images/docs/contour-fill-self-crossing.jpg
        alt: 
        title: 

  - name: clockwise
    category: pattern
    applies-to:
      - contour_fill
    en:
      title: Clockwise
      description: Direction to move around the contour
    de:
      title: Uhrzeigersinn
      description: Bestimmt die Richtung in der die Kontur gestickt wird
    fr:
      title: Sens des aiguilles d'une montre
      description: Direction de déplacement autour du contour.

  - name: smoothness_mm
    category: pattern
    applies-to:
      - contour_fill
      - meander_fill
    en:
      title: Smoothness
      description: |
        Smooth the stitch path.
        Smoothness limits how far the smoothed stitch path is allowed to deviate from the original path. Try low numbers like 0.2.
        Hint: a lower running stitch tolerance may be needed too.
    de:
      title: Glätten
      description: |
        Glättet den Stichpfad.
        Diese Einstellung definiert, wie weit der geglättete Stichpfad vom ursprünglichen Pfad abweichen darf. Versuche niedrige Zahlen wie z.B. 0.2.
        Hinweis: Eventuell ist auch eine geringere Geradstich-Toleranz erforderlich.
    fr:
      title: Lissage
      description: |
        Lisse la broderie.
        Le lissage détermine la mesure dans laquelle le chemin lissé peut s'éloigner du chemin originel. Essayez de petites valeurs comme 0.2.
        Attention, il est possible qu'il faille aussi modifier la tolérance du point droit.

  - name: stop_at_ending_point
    category: direction
    applies-to:
      - linear_gradient_fill
    en:
      title: Stop at ending point
      description: If this option is disabled, the ending point will only be used to define a general direction for stitch routing. When enabled the last section will end at the defined spot.
    de:
      title: Endposition erzwingen
      description: Ist diese Option deaktivert, gibt der Endpunkt nur eine generelle Stickrichtung an. Bei aktivierter Option endet der letzte Farbabschnitt genau an diesem Punnkt.
    fr:
      title: Terminer à la position de fin
      description: Si cette option est désélectionnée, la position de fin ne sera utilisée que pour déterminer la direction générale de la broderie. Si sélectionné, la dernière section terminera au point désigné.

  - name: zigzag_width_mm
    category: pattern
    applies-to:
      - meander_fill
    en:
      title: Zigzag width
      description: |
        Width of zigzag if spacing is non null
    de:
      title: Zick-Zack Breite
      description: Die Breite der Zick-Zack-Linie, bzw. deren Höhe
    fr:
      title: Largeur du zigzag
      description: La largeur du zigzag est définie ici

  - name: rows_per_thread
    category: pattern
    applies-to:
      - tartan_fill
    en:
      title: Rows per tartan thread
      description: Consecutive rows of the same color
    de:
      title: Reihen pro Tartan-Faden
      description: Aufeinanderfolgende Reihen gleicher Farbe
    fr:
      title: Nombre de rangées par fil du Tartan
      description: Nombre de rangées consécutives de la même couleur

  - name: 
    category: 
    applies-to:
      - tartan_fill
    en:
      title: Herringbone width
      description: |
        Defines the width of a herringbone pattern.
        Use 0 for regular rows.
        It is recommended to use a multiple or a fraction of the defined stripe width (or to use only one color on warp and an other color on weft).
    de:
      title: Fischgrätenmuster-Breite
      description: |
        Definiert die Breite des Frischgrätenmusters.
        Nutze 0 für das klassische Tartanmuster.
        Es wird empfohlen ein mehrfaches oder einen teilbaren Wert der Streifen-Breite zu nutzen.
        Ein schönes Ergebnis lässt sich auch erzielen, wenn für Kette und Schuss jeweils nur eine Farbe definiert wurde.
    fr:
      title: Largeur de chevron
      description: |
        Defini la largeur du motif en chevron.
        Choisir 0 pour des bandes normales.
        Il est recommandé d'utiliser un multiple ou une fraction de la largeur de bande (ou d'utiliser seulement une couleur pour la trame et une autre couleur pour la chaîne).

  # Random options (running)

  - name: enable_random_stitch_length
    category: stitch_length
    applies-to:
      - running-stitch
      - ripple-stitch
      - tatami
      - circular_fill
      - cotour_fill
      - guided_fill
      - linear_gradient_fill
      - meander_fill
    en:
      title: Randomize stitch length
      description: Allows for randomize stitch length.
    de:
      title: Zufällige Stichlänge
      description: Anstatt einer gleichmäßigen Verteilung, erfolgt die Stichlänge und -phase nach dem Zufallsprinzip. Dies wird besonders für eng beieinander liegende Kurvenfüllungen empfohlen, um Moiré-Artefakte zu vermeiden.
    fr:
      title: Rendre aléatoire
      description: Rendre la longueur du point aléatoire plutôt que de découper ou décaler régulièrement. Ceci est recommandé lorsque le remplissage est dense pour éviter les effets de moiré.

  - name: random_stitch_length_jitter_percent
    category: stitch_length
    applies-to:
      - running-stitch
      - ripple-stitch
      - tatami
      - circular_fill
      - cotour_fill
      - guided_fill
      - linear_gradient_fill
      - meander_fill
    en:
      title: Random stitch length jitter
      description: Only available if `Randomize stitch length` is selected. Determines the variation in the length of each stitch.
    de:
      title: Zufallsabweichung von der Stichlänge
      description: Maximale randomisierte Abweichung der Stichabstände in Prozent. Zufällige Stichlänge randomisieren muss aktiviert sein.
    fr:
      title: Mouvement aléatoire de la longueur du point
      description: Pourcentage maximum de variation de la longueur du point (appliqué si la longueur est rendue aléatoire).

  - name: random_seed
    category: random
    applies-to:
      - running-stitch
      - ripple-stitch
      - satin
      - e-stitch
      - s-stitch
      - zigzag-satin
      - tatami
      - circula_fill
      - contour_fill
      - guided_fill
      - linear_gradient_fill
      - meande_fill
    en:
      title: Random seed
      description: |
        Change the result of random stitches.
        If empty, the seed is the element ID.
        Re-roll if you are not happy with the result.
    de:
      title: Zufallszahl
      description: |
        Ändert das Ergebnis für randomisierte Stiche.
        Ohne Wert wird die Element-ID verwendet.
        Würfel erneut, wenn dir das Ergebnis nicht gefällt.
    fr:
      title: Graine Aléatoire
      description: |
        Utiliser cette graine aléatoire pour le calcul du plan de broderie.
        Si vide, utilise l'identificateur de l'élément.
        Relancer le dé si vous n'êtes pas satisfait du résultat.

  # All elements

  - name: min_stitch_length_mm
    category: stitch_length
    applies-to:
      - all-types
    en:
      title: Minimum stitch length
      description: |
        Stitches smaller than this value will be removed.
        Overwrites the global minimum stitch length setting.
    de:
      title: Minimale Stichlänge
      description: |
        Stiche, die kleiner sind als dieser Wert werden entfernt.
        Überschreibt die globale Einstellung für die minimale Stichlänge.
    fr:
      title: Longueur minimum de point
      description: |
        Les points plus courts seront supprimés.
        Est prioritaire par rapport à la valeur de la longueur minimum de point définie dans les préférences.

  - name: min_jump_stitch_length_mm
    category: lock
    applies-to:
      - all-types
    en:
      title: Minimum jump stitch length
      description: |
        Shorter distances to the next object will have no lock stitches.
        Overwrites the global minimum jump stitch length setting.
    de:
      title: Minimale Länge für Sprungstiche
      description: |
        Kleinere Entfernungen zum nächsten Objekt haben keine Vernähstiche.
        Überschreibt die globale Einstellung für die minimale Länge für Sprungstiche.
    fr:
      title: Longueur minimum de saut
      description: |
        Si la distance à l'objet suivant est inférieure, il n'y aura pas de points d'arrêt, sauf si les points d'arrêts sont forcés.
        Est prioritaire par rapport à la valeur de la longueur minimum de saut définie dans les préférences.

  - name: ties
    category: lock
    applies-to:
      - all-types
    en:
      title: Allow lock stitches
      description: Enables lock stitches in only desired positions
    de:
      title: Vernähen erlauben
      description: Vernäht bei Bedarf an den ausgewählten Positionen
    fr:
      title: Autoriser des points d'arrêts
      description: Permet l'ajout d'un point d'arrêt à la ou les positions choisies si la longueur minimum de saut (locale ou à défaut globale au fichier) l'impose.

  - name: force_lock_stitches
    category: lock
    applies-to:
      - all-types
    en:
      title: Force lock stitches
      description: If checked, lock stitches are sewn after this element,regardless of the minimum jump stitch length value.
    de:
      title: Vernähen erzwingen
      description: Vernäht den Faden nach diesem Element, unabhängig vom Wert für die Minimale Länge für Sprungstiche
    fr:
      title: Forcer des points d'arrêts
      description: Force un point d'arrêt après l'objet indépendament de la valeur de "longueur minimum de saut".

  - name: lock_start
    category: lock
    applies-to:
      - all-types
    en:
      title: Tack stitch
      description: |
        Determines the type of tack stitch.
        Tack stitches are small stitches at the beginning of a stitch. They help to secure the beginning of the thread.
        [Read more](/docs/stitches/lock-stitches/)
    de:
      title: Anstecher
      description: |
        Bestimmt die Art des Anstehers.
        Ansteche sind kleine Stiche zu Beginn des Stickpfades. Sie sichern so den Faden. [Mehr lesen](/de/docs/stitches/lock-stitches/)
    fr:
      title: Point d'arrêt initial
      description: Choisir le [style désiré](/fr/docs/stitches/lock-stitches/)

  - name: lock_end
    category: lock
    applies-to:
      - all-types
    en:
      title: Lock stitch
      description: |
        Determines the type of lock stitch.
        Lock stitches are small stitches at the end of stitch. They help to secure the end of the thread.
        [Read more](/docs/stitches/lock-stitches/)
    de:
      title: Verstecher
      description: |
        Bestimmt die Art des Verstechers.
        Verstecher sind kleine Stiche am Ende des Stickpfades. Sie sichern so den Faden.
        [Mehr lesen](/de/docs/stitches/lock-stitches/)
    fr:
      title: Point d'arrêt final
      description: Choisir le [style désiré](/fr/docs/stitches/lock-stitches/)

  - name: trim_after
    category: commands
    applies-to:
      - all-types
    en:
      title: Trim After
      description: Determines if the thread is trimmed after sewing this object.
    de:
      title: Fadenschnitt
      description: Schneidet den Faden nachdem dieses Objekt genäht wurde
    fr:
      title: Couper après
      description: Couper le fil après avoir brodé cet objet

  - name: stop_after
    category: commands
    applies-to:
      - all-types
    en:
      title: Stop After
      description: Determines if the machine is stopped after sewing this object. Before stopping it will jump to the stop position (frame out) if defined.
    de:
      title: Stopp
      description: Stoppt die Maschine nachdem dieses Objekt genäht wurde und springt zur Stopp-Position (sofern vorhanden)
    fr:
      title: Arrêter après
      description: Arrêter (pause machine) après avoir brodé cet objet. Avant l'arrêt, il y aura un saut vers la position d'arrêt si elle a été définie












