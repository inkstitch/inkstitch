params:
  - name: satin_column
    category: general
    applies-to:
      - running-stitch
      - ripple-stitch
      - zigzag-stitch
      - manual-stitch
    en:
      title: Running stitch along paths
      description: Must be selected to use these settings.
    de:
      title: Geradstich
      description: Muss aktiviert sein, damit diese Einstellungen wirksam werden.
    fr:
      title: Points droits le long des chemins
      description: Doit être activé pour que ces paramètres prennent effet

  # Geradstich

  - name: stroke_method
    category: general
    applies-to:
      - running-stitch
      - ripple-stitch
      - zigzag-stitch
      - manual-stitch
    en:
      title: Method
      description: Determines which stitch type to use.
      add-descr:
        - stitch-type: running-stitch
          info: Select `Running stitch / Bean stitch`
        - stitch-type: ripple-stitch
          info: Select `Ripple stitch`
        - stitch-type: zigzag-stitch
          info: Select `ZigZag Stitch`
        - stitch-type: manual-stitch
          info: Select `Manual stitch`
    de:
      title: Methode
      description: Bestimmt welche Stichart verwendet wird.
      add-descr:
        - stitch-type: running-stitch
          info: "`Geradstich / Mehrfachgeradstich` auswählen"
        - stitch-type: ripple-stitch
          info: "`Ripple-Stich` auswählen"
        - stitch-type: zigzag-stitch
          info: "`Zickzack-Stich` auswählen"
        - stitch-type: manual-stitch
          info: "`Manuelle Stichpositionierung` auswählen"
    fr:
      title: Méthode
      description: Détermines quel type de point utiliser.
      add-descr:
        - stitch-type: running-stitch
          info: Choisir `Point droit / Point multiple`
        - stitch-type: ripple-stitch
          info: Choisir `Broderie Ondulée`
        - stitch-type: manual-stitch
          info: Choisir `Point manuel`

  - name: manual_pattern_placement
    category: pattern
    applies-to:
      - ripple-stitch
    en:
      title: Manual stitch placement
      description: If selected, extra stitches will not be added to the original ripple pattern and the running stich length value will be ignored.
    de:
      title: Manuelle Stichpositionierung
      description: Es werden keine zusätzlichen Stiche zum Originalmuster hinzugefügt. Der Wert für die Stichlänge wird nicht beachtet.
    fr:
      title: Placement manuel de points
      description: Aucun point ne sera ajouté au motif de départ, chaque motif sera traité comme un point manuel et la longueur du point droit sera ignoré.

  - name: running_stitch_length_mm
    category: stitch_length
    applies-to:
      - running-stitch
      - ripple-stitch
    en:
      title: Running stitch length
      description: |
        Determines the length of stitches (mm). By entering multiple values, it is possible to define a custom stitch length pattern.
        For instance `2 4`  will create stitches of length alternatively 2 and 4 mm.
    de:
      title: Stichlänge
      description: |
        Länge der Stiche (mm). Durch Eingabe mehrerer Werte kann ein Stichlängenmuster erstellt werden.
        Beispielsweise werden bei einem Wert von `2 4` eine Abfolge von Stichen erstellt, die abwechselnd eine Länge von 2mm und 4mm haben.
    fr:
      title: Longueur du point droit
      description: |
        Détermine la longueur des points (mm). En saisissant plusieurs valeurs, il est possible de définir un motif répétitif personnalisé.
        Par exemple, `2 4` créera des points de longueur 2 et 4 mm en alternance.

  - name: running_stitch_tolerance_mm
    category: stitch_length
    applies-to:
      - running-stitch
      - ripple-stitch
      - satin_center_underlay
      - satin_contour_underlay
      - circular_fill
      - contour_fill
      - guided_fill
      - meander_fill
    en:
      title: Running stitch tolerance
      description: Determines the acceptable distance from the path. A lower tolerance will bring the stitches closer together. A higher tolerance allows for stitches to be farther away from the path.  A higher tolerance may mean sharp corners may be rounded.
      image:
        url: /assets/images/docs/run-tolerance.jpg
        alt: 
        title: 
    de:
      title: Geradstich Toleranz
      description: Alle Stiche müssen innerhalb dieser Distanz zum Pfad liegen. Eine niedrigere Toleranz verkürzt die Stiche. Eine höhere Toleranz kann scharfe Ecken abrunden.
      image:
        url: /assets/images/docs/run-tolerance.jpg
        alt: 
        title: 
    fr:
      title: Tolérance du point droit
      description: Les points ne peuvent pas être éloignés du chemin de plus que cette distance. Une tolérance basse peut impliquer des points plus courts dans les courbes. Une tolerance haute entraine un arrondissement des angles aigus.
      image:
        url: /assets/images/docs/run-tolerance.jpg
        alt: 
        title: 

  # Ripple

  - name: line_count
    category: density
    applies-to:
      - ripple-stitch
    en:
      title: Number of lines
      description: Determines the number of ripples. Increasing the number of lines will increase the density of the lines.
      image: 
        url: /assets/images/docs/ripple_only_lines.svg
        alt: Line count
        title: Line count
    de:
      title: Anzahl der Linien
      description: "Anzahl der Wiederholungen der Ripple-Form. Voreinstellung: 10."
      image: 
        url: /assets/images/docs/ripple_only_lines.svg
        alt: Anzahl der Linien
        title: Anzahl der Linien
    fr:
      title: Nombre de lignes
      description: Choisir le nombre de réplications de l'ondulation dans la broderie. La valeur par défaut est 10.
      image: 
        url: /assets/images/docs/ripple_only_lines.svg
        alt: Nombre de lignes
        title: Nombre de lignes

  - name: min_line_dist_mm
    category: density
    applies-to:
      - ripple-stitch
    en:
      title: Minimum line distance
      description: Sets the minimum distance between each line. Overrides the number of lines setting.
    de:
      title: Minimaler Linienabstand
      description: Diese Einstellung überschreibt den Wert "Anzahl der Linien"
    fr:
      title: Distance minimum entre les lignes
      description: Est prioritaire sur le nombre de lignes

  - name: satin_guide_pattern_position
    category: pattern
    applies-to:
      - ripple-stitch
    en:
      title: Pattern position
      description: |
        Pattern position for satin guided ripples:
        * Line count / Minimum line distance (default): uses either the value for line count or minium line distance (if given)
        * Render at rungs renders a pattern at each rung
        * Adaptive + Minimum line distance: adapts the pattern distance according to it's size
    de:
      title: Musterposition
      description: |
        Musterposition für Satinsäulen-geführte Ripplestiche
        * Anzahl der Linien / Minimaler Linienabstand (Standard): nutzt entweder den Wert für die Linienanzahl oder - wenn angegeben - den minimalen Linienabstand
        * Muster an Richtungsvektoren positionieren: positioniert ein Muster an jedem Richtungsvektor
        * Adaptiv + minialer Linienabstand passt den Abstand der Muster an die jweilige Skalierung an
    fr:
      title: Position des ondulations
      description: |
        Position des ondulations lorsque guidées par un satin.
        * Nombre de lignes / Distance entre les lignes (valeur par défaut): utilise soit la valeur du nombre de lignes ou la distance minimum entre les lignes si elle a été définie.
        * Rendu aux traverses: une ondulation à chaque traverse seulement
        * Adaptatif et distance minimum entre les lignes : adapte la distance entre les ondulations selon leur taille

  - name: skip_start
    category: pattern
    applies-to:
      - ripple-stitch
    en:
      title: |
        Skip first lines
        Skip last lines 
      description: Set the number of lines to skip (do not embroider) at the and/or end of the run.
      image: 
        url: /assets/images/docs/ripple_only_skip.svg
        alt: Ripples with skip values
        title: Ripples with skip values
    de:
      title: |
        Erste Linien überspringen
        Letzte Linien überspringen
      description: Die ersten / letzten Ripple-Wiederholungen werden übersprungen und die Gesamtanzahl der Wiederholungen verringert sich.
      image: 
        url: /assets/images/docs/ripple_only_skip.svg
        alt: Ripple mit übersprungen Linien am Start / Ende
        title: Ripple mit übersprungen Linien am Start / Ende
    fr:
      title: |
        Sauter les premières lignes
        Sauter les dernières lignes
      image: 
        url: /assets/images/docs/ripple_only_skip.svg
        alt: Sauter
        title: Sauter
      description: Détermine le nombre d'ondulations à sauter (ne pas broder) au début et à la fin de la broderie.

  - name: flip_copies
    category: pattern
    applies-to:
      - ripple-stitch
    en:
      title: Flip every second line
      description: "Linear ripple only: whether to flip the pattern every second line or not"
    de:
      title: Jede zweite Reihe umkehren
      description: "Nur für lineare Ripples: bestimmt ob jede zweite Reihe des Musters in umgekehrter oder immer in gleicher Richtung verläuft"
    fr:
      title: Inverser une ligne sur deux
      description: "Seulement pour des ondulations linéaires: inverser les ondulations une fois sur deux ou pas."

  - name: exponent
    category: density
    applies-to:
      - ripple-stitch
    en:
      title: Line distance exponent
      image: 
        url: /assets/images/docs/ripple_only_exponent.svg
        alt: Exponent
        title: Exponent
      description: |
        Doesn't apply to satin guided ripples
        * Default 1: constant distance between lines
        * Value > 1: the space between two consecutive replications increases
        * Value < 1: the space between two consecutive replications decreases
    de:
      title: Linienabstand Exponent
      image: 
        url: /assets/images/docs/ripple_only_exponent.svg
        alt: Exponent
        title: Exponent
      description: |
        Gilt nicht für Satinsäulen-geführte Ripples
        * Voreinstellung 1: der Abstand zwischen den Linien ist konstant
        * Wert > 1: der Abstand zwischen den Linien erhöht sich sukzessiv
        * Wert < 1: der Abstand zwischen den Linien erringert sich
    fr:
      title: Exposant de la distance entre les lignes
      image: 
        url: /assets/images/docs/ripple_only_exponent.svg
        alt: Exposant
        title: Exposant
      description: |
        Ne s'applique pas aux ondulations guidées par un satin
        * La valeur par défaut de 1 espace les réplications de manière constante
        * Avec une valeur supérieure à 1 l'espace entre deux réplications consécutives augmente au fur et à mesure qu'on s'éloigne du chemin qui définit l'ondulation
        * Avec une valeur inférieure à 1 l'espace entre deux réplications consécutives diminue au fur et à mesure qu'on s'éloigne du chemin qui définit l'ondulation.

  - name: flip_exponent
    category: density
    applies-to:
      - ripple-stitch
    en:
      title: Flip exponent
      description: Exchange role of first and last line in the computation of line distance
    de:
      title: Exponent umkehren
      description: Kehrt den Effekt des Exponent-Wertes um.
    fr:
      title: Inverser effet exposant
      description: Échange le rôle de la première et de la dernière réplication pour le calcul de la distance entre les réplications

  - name: reverse
    category: direction
    applies-to:
      - ripple-stitch
    en:
      title: Reverse
      description: Flip start and end point and run the path in revese direction
    de:
      title: Umkehren
      description: Start- und Endpunkt vertauschen. Läuft den Pfad in umgekehrte Richtung ab.
    fr:
      title: Changer le sens
      description: Intervertit le début et la fin

  - name: grid_size_mm
    category: pattern
    applies-to:
      - ripple-stitch
    en:
      title: Grid size
      description: If the size is strictly positive a grid effect is added. The grid size controls how far apart the new lines are.
      image:
        url: /assets/images/docs/ripple_only_grid.svg
        alt: Grid
        title: grid
    de:
      title: Größe des Gitters
      description: Fügt quer verlaufende Linien hinzu, die zu einem Gittereffekt führen. Die Größe des Gitters kann auch Auswirkungen auf die Genauigkeit des Linienverlaufs haben.
      image:
        url: /assets/images/docs/ripple_only_grid.svg
        alt: Gitter
        title: gitter
    fr:
      title: Taille de la grille
      description: Si une distance positive est spécifiée, les ondulations de la broderie sont complétées en une "grille", par un chemin "perpendiculaire" aux ondulations. Le paramètre contrôle l'écart de ces perpendiculaires. Intervertir n'a pas d'influence sur ce paramètre.
      image:
        url: /assets/images/docs/ripple_only_grid.svg
        alt: Grille
        title: grille

  - name: grid_first
    category: pattern
    applies-to:
      - ripple-stitch
    en:
      title: Stitch grid first
      description: Reverse the stitch path, so that the grid is stitched first.
    de:
      title: Gitter zuerst sticken
      description: Dreht den Stickpfad um, so dass da Gitter zuerst gestickt wird
    fr:
      title: Broder d'abord la grille
      description: Brode en sens inverse de telle sorte que la grille est brodée en premier.

  - name: scale_axis
    category: pattern
    applies-to:
      - ripple-stitch
    en:
      title: Scale axes
      description: guided ripple only
    de:
      title: Skalieren
      description: Nur für geführte Ripples
    fr:
      title: Mettre à l'echelle sur l'axe
      description: seulement pour des ondulations guidées.

  - name: scale_start
    category: pattern
    applies-to:
      - ripple-stitch
    en:
      title: Starting scale
      description: |
        Size of the first copy of the line in percent.
        For guided ripple only
    de:
      title: Start-Skalierung
      description: |
        Skalierung der ersten Linie in Prozent.
        Nur für geführte Ripples.
    fr:
      title: Démarrer à
      description: |
        Taille de la première ondulation en pourcentage.
        Seulement pour des ondulations guidées

  - name: scale_end
    category: pattern
    applies-to:
      - ripple-stitch
    en:
      title: Ending scale
      description: |
        Size of the last copy of the line in percent.
        For guided ripple only 
    de:
      title: End-Skalierung
      description: |
        Skalierung der letzten Linie in Prozent.
        Nur für geführte Ripples.
    fr:
      title: Finir à
      description: |
        Taille de la dernière ondulation en pourcentage.
        Seulement pour des ondulations guidées

  - name: rotate_ripples
    category: pattern
    applies-to:
      - ripple-stitch
    en:
      title: Rotate
      description: For guided ripple only
    de:
      title: Rotieren
      description: Nur für geführte Ripples
    fr:
      title: Tourner
      description: Seulement pour des ondulations guidées

  - name: join_style
    category: pattern
    applies-to:
      - ripple-stitch
    en:
      title: Join Style
      description: "for non circular ripple, how the ripples are joined : Flat(top) or Point(bottom)"
      image:
        url: /assets/images/docs/flat_or_point.svg
        alt: 
        title: 
    de:
      title: Kantenstil
      description: "Verbindungen zwischen den Linien: flach (oben) oder spitz (unten). Nur für offene Ripples."
      image:
        url: /assets/images/docs/flat_or_point.svg
        alt: 
        title: 
    fr:
      title: Style de Jointure
      description: Pour des ondulations ouvertes,les réplications peuvent être jointes par un segment (en haut) ou en un seul point (en bas)
      image:
        url: /assets/images/docs/flat_or_point.svg
        alt: 
        title: 

  - name: max_stitch_length_mm
    category: stitch_length
    applies-to:
      - satin
      - e-stitch
      - s-stitch
      - zigzag-satin
      - satin_zigzag_underlay
    en:
      title: Maximum stitch length
      description: Stitches wider than this will be split up (split stitches).
      image:
        url: /assets/images/docs/params-satin-maximum_stitch_length.png
        alt: 
        title: 
    de:
      title: Maximale Stichlänge
      description: Stiche die diesen Wert übersteigen, werden geteilt.
      image:
        url: /assets/images/docs/params-satin-maximum_stitch_length.png
        alt: 
        title: 
    fr:
      title: Longueur maximale du point
      description: Les points plus longs seront découpés en plusieurs points.
      image:
        url: /assets/images/docs/params-satin-maximum_stitch_length.png
        alt: 
        title: 

  - name: split_method
    category: split_stitches
    applies-to:
      - satin
      - e-stitch
      - s-stitch
      - zigzag-satin
    en:
      title: Split Method
      description: |
        Split stitches apply, when a maximum stitch length is set and the stitch length exceeds this value. Options:
        * default
        * Simple
        * Staggered
      image:
        url: /assets/images/docs/param_split_satin.png
        alt: 
        title: 
    de:
      title: Zwischenstich-Methode
      description: |
        Zwischenstiche werden gesetzt, wenn ein Wert für die maximale Stichlänge festgelegt wurde und die Stichlänge diesen Wert überschreitet. Optionen:
        * Standard
        * Einfach
        * Stichversatz
      image:
        url: /assets/images/docs/param_split_satin.png
        alt: 
        title: 
    fr:
      title: Méthode de découpage
      description: |
        Le découpage des points ne s'applique que si une longueur maximum des points a été fixée et que le point dépasse cette longueur. Options:
        * Par défaut
        * Simple
        * Décalé
      image:
        url: /assets/images/docs/param_split_satin.png
        alt: 
        title: 

  - name: random_split_jitter_percent
    category: split_stitches
    applies-to:
      - satin
      - e-stitch
      - s-stitch
      - zigzag-satin
    en:
      title: Random Jitter for split stitches
      description: Randomizes split stitch length if random phase is enabled, stitch position if disabled.
      image:
        url: /assets/images/docs/params-satin-random-split-stitch-jitter.png
        alt: 
        title: 
    de:
      title: Zufälliges Zittern für Zwischenstiche
      description: |
        Wenn die Option für randomisierte Zwischenstiche aktiviert ist, wird die Stichlänge für Zwischenstiche randomisiert.
        Ist die Option deaktiviert, bezieht sich der Wert auf die Zwischenstich-Positionen
      image:
        url: /assets/images/docs/params-satin-random-split-stitch-jitter.png
        alt: 
        title: 
    fr:
      title: Déplacement aléatoire pour le découpage des points
      description: Si le découpage totalement aléatoire des points est activé, ce paramètre rend la longueur du point aléatoire, sinon, le déplacement aléatoire du découpage se fait autour de sa position normale
      image:
        url: /assets/images/docs/params-satin-random-split-stitch-jitter.png
        alt: 
        title: 

  - name: random_split_phase
    category: split_stitches
    applies-to:
      - satin
      - e-stitch
      - s-stitch
    en:
      title: Random Phase for split stitches
      description: Controls whether split stitches are centered or with a random phase (which may increase stitch count).
    de:
      title: Randomisierte Zwischenstiche
      description: Kontrolliert ob die Zwischenstiche mittig liegen oder sich zufällig über die Stichkänge verteilen (dies kann ggf. die Stichanzahl erhöhen).
    fr:
      title: Découpage totalement aléatoire des points
      description: Si activé, le découpage des points est totalement aléatoire (ce qui risque de modifier le nombre de points par zig (ou par zag)), sinon, le nombre de points par zig est conservé, mais leur position sur le zig peut varier du déplacement aléatoire paramétré.

  - name: split_staggers
    category: split_stitches
    applies-to:
      - satin
      - e-stitch
      - s-stitch
    en:
      title: Stagger this many times before repeating
      description: |
        Stitches are staggered so that neighboring rows of stitches don't all fall in the same column (which would create a distracting valley effect).
        Setting this dictates the length of the cycle by which successive stitch rows are staggered.
        Fractional values are allowed and can have less visible diagonals than integer values.
        **Active only when split method is staggered**
      image:
        url: /assets/images/docs/params-fill-stagger.png
        alt: 
        title: 
    de:
      title: Stichversatz
      description: |
        Die Einstellung bestimmt, wie viele Reihen die Stiche voneinander entfernt sind, bevor sie in die gleiche Position münden.
        Dezimalwerte sind zulässig und zeigen weniger deutliche Diagonalen im Stickbild.
        Die Einstellung bezieht sich auf die Zwischenstichmethode "Stichversatz".
      image:
        url: /assets/images/docs/params-fill-stagger.png
        alt: 
        title: 
    fr:
      title: Décaler les découpages de points autant de fois avant de répéter
      description: |
        Les points sont décalés de manière à ce que les rangées de points voisines ne tombent pas toutes dans la même colonne (ce qui créerait un effet de vallée).
        Ce paramètre détermine la longueur du cycle de décalage des rangées.
        N'est actif qu'avec l'option de découpage "décalé".
      image:
        url: /assets/images/docs/params-fill-stagger.png
        alt: 
        title: 

  # Zigzag

  - name: zigzag_angle
    category: pattern
    applies-to:
      - zigzag-stitch
    en:
      title: Zig-zag angle
      description: Creates spoke/radial effects on curves by rotating the zig-zag direction by this angle (degrees).
    de:
      title: Zickzack Winkel
      description: Erzeugt einen Strahleneffekt bei Kurven, indem die Zickzack-Richtung um diesen Winkel gedreht wird (Grad).
    fr:
      title: Angle du Zig-Zag
      description: Tourner la direction des zig-zags de cet angle (en degrés). Crée des effets de rayons sur les courbes.

  - name: stroke_pull_compensation_mm
    category: compensation
    applies-to:
      - zigzag-stitch
    en:
      title: Pull compensation
      description: |
        Zigzag stitches pull the fabric together, resulting in a column narrower than you draw in Inkscape.
        This widens the zigzag line. You can use it to change the width of your zigzag. Negative values are allowed.
    de:
      title: Zugausgleich
      description: |
        Zickzack-Stitche ziehen den Stoff zusammen und werden dadurch schmaller als in Inkscape gezeichnet.
        Diese Einstellung erweitert die Zickzack-Linie. Negative Werte sind erlaubt und haben den gegenteiligen Effekt.
    fr:
      title: Compensation d'étirement
      description: |
        Peut-être utilisée pour modifier la largeur du zigzag, s'ajoute  à la largeur définie par l'épaisseur du trait.
        Peut être négative

  # Manual

  - name: max_stitch_length_mm
    category: stitch_length
    applies-to:
      - manual-stitch
