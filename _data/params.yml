  - name: pull_compensation_percent
    category: compensation
    applies-to:
      - satin
      - e-stitch
      - s-stitch
      - zigzag-satin
    en:
      title: Pull compensation (%)
      description: Additional pull compensation which varies as a percentage of stitch width. Two values separated by a space may be used for an asymetric effect.
      image:
        url: /assets/images/docs/params-satin-pull_compensation.png
        alt: 
        title: 
    de:
      title: Zugausgleich (%)
      description: Zusätzliche Zugkompensation, die als Prozentwert der ursprünglichen Breite variiert. Zwei durch ein Leerzeichen getrennte Werte können für einen asymmetrischen Effekt verwendet werden.
      image:
        url: /assets/images/docs/params-satin-pull_compensation.png
        alt: 
        title: 
    fr:
      title: Pourcentage de compensation d'étirement
      description: Compensation d'étirement proportionelle à la largeur du point satin. Deux valeurs séparées par un espace peuvent être utilisées pour un effet asymétrique.
      image:
        url: /assets/images/docs/params-satin-pull_compensation.png
        alt: 
        title: 

  - name: pull_compensation_mm
    category: compensation
    applies-to:
      - satin
      - e-stitch
      - s-stitch
      - zigzag-satin
    en:
      title: Pull compensation (mm)
      description: |
        Satin stitches [pull the fabric together](/tutorials/push-pull-compensation/), resulting in a column narrower than you draw in Inkscape.
        This setting expands each pair of needle penetrations outward from the center of the satin column by a fixed length.
        Two values separated by a space may be used for an asymetric effect.
        Negative values lead to the opposite effect.
      image:
        url: /assets/images/docs/params-satin-pull_compensation.png
        alt: 
        title: 
    de:
      title: Zugausgleich (mm)
      description: |
        Satinstiche [ziehen den Stoff zusammen](/tutorials/push-pull-compensation/), was zu einer Säule führt, die schmaler ist, als in Inkscape geplant.
        Diese Einstellung erweitert jedes Nadeleinstichpaar von der Mitte der Satinsäule nach außen.
        Es muss experimentell bestimmt werden, wie viel Kompensation für deine Kombination aus Stoff, Faden und Stabilisator benötigt wird.
        Zwei durch ein Leerzeichen getrennte Werte können für einen asymmetrischen Effekt genutzt werden.
        Ein negativer Wert hat den Gegenteiligen Effekt.
      image:
        url: /assets/images/docs/params-satin-pull_compensation.png
        alt: 
        title: 
    fr:
      title: Compensation d'étirement
      description: |
        Les points Satin [resserrent le tissu](/fr/tutorials/push-pull-compensation/), il en résulte une colonne plus étroite que votre dessin dans Inkscape.
        Ce paramètre étend chaque paire de pénétrations d’aiguilles vers l’extérieur de la colonne satin. Vous devrez expérimentalement déterminer le montant de la compensation en tenant compte de votre tissu, de votre fil et de votre stabilisateur.
        Deux valeurs séparées par un espace peuvent être utilisées pour un effet asymétrique.
        Une valeur négative contracte.
      image:
        url: /assets/images/docs/params-satin-pull_compensation.png
        alt: 
        title: 

  - name: push_compensation_mm
    category: compensation
    applies-to:
      - satin
    en:
      title: Push compensation
      description: |
        Satin stitches [push out to the ends](/tutorials/push-pull-compensation/), which results into a longer columns than drawn in Inkscape.
        This setting shortens the column by the given amound (mm) at start and/or end.
        Two values separated by a space may be used for an asymetric effect.
        Negative values lead to the opposite effect.
      image:
        url: 
        alt: 
        title: 
    de:
      title: Druckausgleich
      description: |
        Satinstiche [drücken sich zu den Enden hin raus](/tutorials/push-pull-compensation/), was zu einer längeren Satinsäule führt, als in Inkscape geplant.
        Diese Einstellung verkürzt die Säule um den angegebenen Wert (mm) am Anfang und/oder Ende.
        Zwei durch ein Leerzeichen getrennte Werte können für einen asymmetrischen Effekt genutzt werden.
        Ein negativer Wert hat den Gegenteiligen Effekt.
      image:
        url: 
        alt: 
        title: 
    fr:
      title: Push compensation
      description: |
        Les colonnes satins [poussent le tissu vers le extrémités](/fr/tutorials/push-pull-compensation/),  ce qui résulte en des colonnes plus longues que ce qui a été déssiné dans inkscapewhich results into a longer columns than drawn in Inkscape.
        Ce paramètre racourci la colonne de la valeur indiquée au début et/ou à la fin.
        Deux valeurs séparées par un espace peuvent être utilisées pour un effet asymétrique.
        Une valeur négative contracte.
      image:
        url: 
        alt: 
        title: 

  - name: reverse_rails
    category: direction
    applies-to:
      - ripple-stitch
      - satin
      - e-stitch
      - s-stitch
      - zigzag-satin
    en:
      title: Reverse rails
      description: |
        Enabling this may help if your satin renders very strangely. Options are:
        * Automatic: detect and fix rails with opposing directions (default)
        * Don't reverse , disable automatic detection
        * Reverse first rail
        * Reverse second rail
        * Reverse both rails
      image:
        url: /assets/images/docs/satin-reverse-rung.png
        alt: 
        title: 
      add-descr:
        - stitch-type: ripple-stitch
          info: Takes effect on a satin guide line.
    de:
      title: Konturlinien umkehren
      description: |
        Außenkonturen der Satin-Führungslinie umkehren. Optionen:
        * Automatisch: gegenläufige Außenkonturen werden automatisch korrigiert (Standardeinstellung)
        * Nicht umkehren, deaktiviert automatisches drehen
        * Erste Konturlinie umkehren
        * Zweite Konturlinie umkehren
        * Beide Konturlinien umkehren
      image:
        url: /assets/images/docs/satin-reverse-rung.png
        alt: 
        title: 
      add-descr:
        - stitch-type: ripple-stitch
          info: Nimmt Bezug auf Satin-Führungslinien.
    fr:
      title: Inverser la direction des rails
      description: |
        Ceci peut aider si le rendu de votre satin est étrange. Options:
        * Automatique, valeur par défaut, cherche à détecter et corriger le cas des rails ayant des directions opposées.
        * Ne pas inverser désactive la détection automatique
        * Inverser la direction du premier rail
        * Inverser la direction du second rail
        * Inverser la direction des deux rails
      image:
        url: /assets/images/docs/satin-reverse-rung.png
        alt: 
        title: 
      add-descr:
        - stitch-type: ripple-stitch
          info: Takes effect on a satin guide line.

  - name: swap_rails
    category: direction
    applies-to:
      - ripple-stitch
      - satin
      - e-stitch
      - s-stitch
      - zigzag-satin
    en:
      title: Swap rails
      description: Swaps the first and the second rails of a satin column. Affecting which side the thread finishes on as well as any other sided property.
      add-descr:
        - stitch-type: ripple-stitch
          info: Takes effect on a satin guide line.
    de:
      title: Seiten umkehren
      description: Kehrt die Seiten der Satinsäule um (links und rechts). Dies beeinflusst z.B. an welcher Seite der Faden startet und endet. Aber auch jede andere seitenbezogene Einstellung ist hiervon betroffen.
      add-descr:
        - stitch-type: ripple-stitch
          info: Nimmt Bezug auf Satin-Führungslinien.
    fr:
      title: Échanger les rails
      description: Échange les deux rails de la colonne satin, ce qui affecte le côté de fin de broderie ainsi que tous les paramètres asymétriques
      add-descr:
        - stitch-type: ripple-stitch
          info: Affecte la colonne satin guide.

